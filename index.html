<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reporte de Competencia Retail | Coppel</title>
  <style>
    :root {
      --blue-900: #001b64;
      --blue-800: #002b86;
      --blue-700: #0033a0;
      --blue-500: #0057ff;
      --yellow: #ffd200;
      --yellow-2: #ffea70;
      --ink: #101828;
      --muted: #667085;
      --surface: rgba(255, 255, 255, 0.88);
      --line: rgba(255, 255, 255, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 92% 8%, rgba(255, 210, 0, 0.95) 0 11%, transparent 11.5%),
        radial-gradient(circle at 78% 18%, rgba(0, 87, 255, 0.34) 0 18%, transparent 33%),
        linear-gradient(135deg, var(--blue-900), var(--blue-800) 45%, var(--blue-700));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.65), transparent 72%);
    }

    .shell {
      width: min(1440px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 30px 0 28px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px 22px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: rgba(255,255,255,.08);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .22);
      backdrop-filter: blur(18px);
    }

    .title-block {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .mark {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: linear-gradient(145deg, var(--yellow), var(--yellow-2));
      box-shadow: 0 12px 30px rgba(255, 210, 0, .35);
      display: grid;
      place-items: center;
      color: var(--blue-800);
      font-weight: 900;
      letter-spacing: -4px;
      padding-right: 4px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 44px);
      line-height: 1;
      letter-spacing: -1.2px;
    }

    .subtitle {
      margin-top: 8px;
      color: rgba(255,255,255,.78);
      font-size: 14px;
    }

    .brand {
      font-size: clamp(22px, 2.2vw, 34px);
      font-weight: 800;
      white-space: nowrap;
    }

    .brand::before {
      content: "●●●";
      color: var(--yellow);
      font-size: .72em;
      margin-right: 10px;
      letter-spacing: -3px;
      vertical-align: middle;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      margin: 22px 0;
    }

    .status-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px 22px;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 54px rgba(0,0,0,.18);
    }

    .eyebrow {
      color: var(--yellow);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .status-card p {
      margin: 0;
      color: rgba(255,255,255,.84);
      font-size: 15px;
      line-height: 1.45;
    }

    .chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.1);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      color: rgba(255,255,255,.88);
      backdrop-filter: blur(12px);
    }

    .report-frame {
      position: relative;
      border-radius: 30px;
      padding: 14px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.44), rgba(255,255,255,.08)),
        linear-gradient(135deg, rgba(255,210,0,.65), rgba(0,87,255,.75));
      box-shadow:
        0 34px 90px rgba(0,0,0,.38),
        inset 0 1px 0 rgba(255,255,255,.45);
    }

    .report-frame::before,
    .report-frame::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(22px);
      opacity: .55;
      z-index: -1;
    }

    .report-frame::before {
      width: 260px;
      height: 260px;
      background: var(--yellow);
      right: -52px;
      bottom: -76px;
    }

    .report-frame::after {
      width: 220px;
      height: 220px;
      background: var(--blue-500);
      left: -54px;
      top: 90px;
    }

    .toolbar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-radius: 20px 20px 10px 10px;
      background: rgba(3, 18, 67, .72);
      border: 1px solid rgba(255,255,255,.14);
      margin-bottom: 10px;
    }

    .dots {
      display: flex;
      gap: 8px;
    }

    .dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,.38);
    }

    .dots span:first-child { background: var(--yellow); }

    .toolbar-label {
      color: rgba(255,255,255,.72);
      font-size: 13px;
    }

    .iframe-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 14px 14px 20px 20px;
      background: #eef2ff;
      border: 1px solid rgba(255,255,255,.2);
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-top: 22px;
      color: rgba(255,255,255,.68);
      font-size: 13px;
    }

    .effective {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 28px;
      color: white;
      opacity: .9;
    }

    @media (max-width: 900px) {
      .shell { width: min(100% - 28px, 1440px); padding-top: 14px; }
      .topbar, .hero, .footer { flex-direction: column; align-items: flex-start; }
      .hero { grid-template-columns: 1fr; }
      .chips { justify-content: flex-start; }
      .report-frame { border-radius: 20px; padding: 8px; }
      .toolbar { height: 38px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="title-block">
        <div class="mark">•••</div>
        <div>
          <h1>Reporte de Competencia Retail</h1>
          <div class="subtitle">Dashboard interactivo Power BI · Grupo Coppel</div>
        </div>
      </div>
      <div class="brand">Coppel</div>
    </header>

  

    <main class="report-frame">
      <div class="toolbar">
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="toolbar-label">REPORTE DE COMPETENCIA RETAIL - COPPEL</div>
      </div>

      <div class="iframe-wrap">
        <iframe
          title="REPORTE DE COMPETENCIA RETAIL- COPPEL"
          src="https://app.powerbi.com/reportEmbed?reportId=7647a9ef-ef89-45fa-9689-2d64e55c5637&autoAuth=true&ctid=1b635d23-d7cd-46f8-a33b-d081f11e0d7d"
          allowfullscreen="true">
        </iframe>
      </div>
    </main>

    <footer class="footer">
      <div class="effective">effective</div>
      <div>Confidencial · Visualización embebida para uso interno</div>
    </footer>
  </div>
</body>
</html>
