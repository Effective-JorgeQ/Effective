<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Effective | Dashboard</title>
  <style>
    :root {
      --gold: #d4a843;
      --gold-light: #f0d078;
      --gold-gradient: linear-gradient(135deg, #d4a843, #f0d078, #d4a843);
      --dark: #0a0a0a;
      --dark-card: rgba(255, 255, 255, 0.04);
      --border-glass: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--dark);
      color: var(--text-primary);
      overflow-x: hidden;
      position: relative;
    }

    /* Fondo con textura elegante */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(212, 168, 67, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(212, 168, 67, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(212, 168, 67, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grid sutil de fondo */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 40px 28px;
      position: relative;
      z-index: 1;
    }

    /* =========================
       SPLASH SCREEN ELEGANTE
    ========================= */
    .splash-screen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: grid;
      place-items: center;
      background: #0a0a0a;
      animation: splashFadeOut 1.2s ease forwards;
      animation-delay: 3s;
    }

    .splash-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(212, 168, 67, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(212, 168, 67, 0.08) 0%, transparent 50%);
      animation: pulseGlow 3s ease-in-out infinite;
    }

    .splash-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 48px 64px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 168, 67, 0.15);
      box-shadow:
        0 40px 80px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: splashScaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      min-width: 320px;
    }

    .splash-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: var(--gold-gradient);
      display: grid;
      place-items: center;
      font-size: 36px;
      color: #0a0a0a;
      box-shadow: 0 20px 60px rgba(212, 168, 67, 0.3);
      animation: iconPulse 2s ease-in-out infinite;
      position: relative;
    }

    .splash-icon::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(212, 168, 67, 0.2);
      animation: ringPulse 2s ease-in-out infinite;
    }

    .splash-content h1 {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -1px;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .splash-content .sub {
      font-size: 13px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-weight: 300;
      margin-bottom: 32px;
    }

    .splash-loader {
      width: 200px;
      height: 2px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .splash-loader::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 40%;
      background: var(--gold-gradient);
      border-radius: 4px;
      animation: loaderSlide 1.2s ease-in-out infinite;
    }

    .splash-loader::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, transparent, rgba(212, 168, 67, 0.1), transparent);
      animation: loaderShine 1.8s ease-in-out infinite;
    }

    .splash-footer {
      margin-top: 28px;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* =========================
       TOPBAR ELEGANTE
    ========================= */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      margin-bottom: 32px;
      position: relative;
    }

    .topbar::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 20px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(212, 168, 67, 0.2), transparent 40%, transparent 60%, rgba(212, 168, 67, 0.1));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--gold-gradient);
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 16px;
      color: #0a0a0a;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-text .name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-text .tag {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .topbar-right .date {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 300;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: dotPulse 2s ease-in-out infinite;
    }

    /* =========================
       REPORT FRAME MEJORADO
    ========================= */
    .report-frame {
      position: relative;
      border-radius: 24px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .report-frame::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(212, 168, 67, 0.15), transparent 30%, transparent 70%, rgba(212, 168, 67, 0.08));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Efecto de brillo ambiental */
    .report-frame::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(212, 168, 67, 0.06), transparent 70%);
      bottom: -100px;
      right: -100px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .iframe-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 16px;
      background: #0a0a0a;
      border: 1px solid rgba(255, 255, 255, 0.04);
      z-index: 1;
    }

    .iframe-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    /* =========================
       TOOLBAR DEL REPORTE
    ========================= */
    .report-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      margin-bottom: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-dots {
      display: flex;
      gap: 6px;
    }

    .toolbar-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      transition: background 0.3s ease;
    }

    .toolbar-dots span:first-child {
      background: var(--gold);
    }

    .toolbar-dots span:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .toolbar-label {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      font-weight: 300;
    }

    .toolbar-actions {
      display: flex;
      gap: 16px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .toolbar-actions .action-btn {
      cursor: pointer;
      transition: all 0.3s ease;
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      position: relative;
    }

    .toolbar-actions .action-btn:hover {
      color: var(--gold);
      background: rgba(212, 168, 67, 0.1);
      transform: translateY(-1px);
    }

    .toolbar-actions .action-btn:active {
      transform: scale(0.95);
    }

    .toolbar-actions .action-btn .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      background: rgba(0, 0, 0, 0.9);
      color: var(--text-secondary);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 10px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .toolbar-actions .action-btn:hover .tooltip {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* =========================
       MODAL PANTALLA COMPLETA - CORREGIDO
    ========================= */
    .fullscreen-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99998;
      background: #0a0a0a;
      padding: 0;
      animation: modalFadeIn 0.3s ease;
    }

    .fullscreen-modal.active {
      display: flex;
      flex-direction: column;
    }

    .fullscreen-modal .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: rgba(10, 10, 10, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
      z-index: 10;
    }

    .fullscreen-modal .modal-header .modal-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .fullscreen-modal .modal-header .modal-brand .brand-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--gold-gradient);
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 13px;
      color: #0a0a0a;
    }

    .fullscreen-modal .modal-header .modal-brand span {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .fullscreen-modal .modal-header .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: grid;
      place-items: center;
    }

    .fullscreen-modal .modal-header .modal-close:hover {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      transform: rotate(90deg);
    }

    .fullscreen-modal .modal-body {
      flex: 1;
      padding: 12px;
      background: #ffffff;
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }

    .fullscreen-modal .modal-body iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
      border-radius: 12px;
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* =========================
       FOOTER ELEGANTE
    ========================= */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .footer-brand .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s ease;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    .footer-links a:hover {
      color: var(--gold);
    }

    /* =========================
       ANIMACIONES
    ========================= */
    @keyframes splashFadeOut {
      0% { opacity: 1; visibility: visible; }
      80% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    @keyframes splashScaleIn {
      0% { opacity: 0; transform: scale(0.92) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes iconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.2); opacity: 0; }
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    @keyframes loaderSlide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }

    @keyframes loaderShine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* =========================
       RESPONSIVE
    ========================= */
    @media (max-width: 900px) {
      .shell {
        padding: 16px 20px 20px;
      }

      .splash-content {
        padding: 32px 24px;
        min-width: auto;
        width: calc(100% - 40px);
        margin: 0 20px;
      }

      .splash-content h1 {
        font-size: 36px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
        padding: 16px 20px;
      }

      .topbar-right {
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .report-toolbar {
        flex-direction: column;
        gap: 10px;
        align-items: flex-start;
      }

      .footer {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }

      .footer-links {
        flex-wrap: wrap;
        justify-content: center;
      }

      .fullscreen-modal .modal-header {
        padding: 12px 16px;
      }

      .fullscreen-modal .modal-body {
        padding: 8px;
      }

      .fullscreen-modal .modal-body iframe {
        border-radius: 8px;
      }
    }

    @media (max-width: 480px) {
      .splash-content h1 {
        font-size: 28px;
      }

      .splash-icon {
        width: 60px;
        height: 60px;
        font-size: 28px;
      }

      .brand-text .name {
        font-size: 17px;
      }

      .topbar-right .date {
        font-size: 11px;
      }

      .toolbar-actions {
        gap: 10px;
      }

      .toolbar-actions .action-btn {
        width: 28px;
        height: 28px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <!-- =========================
       SPLASH SCREEN ELEGANTE
  ========================= -->
  <div class="splash-screen">
    <div class="splash-content">
      <div class="splash-icon">
        <i class="fas fa-chart-line"></i>
      </div>
      <h1>Effective</h1>
      <p class="sub">Bienvenid@s</p>
      <div class="splash-loader"></div>
      <p class="splash-footer">Cargando visualización</p>
    </div>
  </div>

  <!-- =========================
       MODAL PANTALLA COMPLETA - CORREGIDO
  ========================= -->
  <div class="fullscreen-modal" id="fullscreenModal">
    <div class="modal-header">
      <div class="modal-brand">
        <div class="brand-icon">E</div>
        <span>Effective · Dashboard Clientes</span>
      </div>
      <button class="modal-close" id="closeFullscreen">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body">
      <iframe
        title="Dashboard Clientes Effective - Fullscreen"
        src="https://app.powerbi.com/reportEmbed?reportId=7647a9ef-ef89-45fa-9689-2d64e55c5637&autoAuth=true&ctid=1b635d23-d7cd-46f8-a33b-d081f11e0d7d"
        allowfullscreen="true">
      </iframe>
    </div>
  </div>

  <!-- =========================
       CONTENIDO PRINCIPAL
  ========================= -->
  <div class="shell">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">E</div>
        <div class="brand-text">
          <span class="name">Effective</span>
          <span class="tag"></span>
        </div>
      </div>
      <div class="topbar-right">
        <span class="date">
          <i class="far fa-calendar-alt" style="margin-right: 6px;"></i>
          Junio 2026
        </span>
        <span class="status-dot">
          <span class="dot"></span>
          En vivo
        </span>
      </div>
    </header>

    <!-- REPORTE -->
    <div class="report-frame">
      <div class="report-toolbar">
        <div class="toolbar-left">
          <div class="toolbar-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <span class="toolbar-label">Dashboard · Clientes</span>
        </div>
        <div class="toolbar-actions">
          <button class="action-btn" id="fullscreenBtn" title="Pantalla completa">
            <i class="fas fa-expand-alt"></i>
            <span class="tooltip">Pantalla completa</span>
          </button>
        </div>
      </div>

      <div class="iframe-wrap">
        <iframe
          id="dashboardFrame"
          title="Dashboard Clientes Effective"
          src="https://app.powerbi.com/reportEmbed?reportId=7647a9ef-ef89-45fa-9689-2d64e55c5637&autoAuth=true&ctid=1b635d23-d7cd-46f8-a33b-d081f11e0d7d"
          allowfullscreen="true">
        </iframe>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-brand">
        <span class="logo-text">effective</span>
        <span style="color: var(--text-muted); font-weight: 300;">|</span>
        <span style="color: var(--text-secondary); font-weight: 300;">Media</span>
      </div>
      <div class="footer-links">
        <a href="#">Confidencial</a>
        <a href="#">Uso interno</a>
        <a href="#">v2.4.1</a>
      </div>
    </footer>
  </div>

  <script>
    // =========================
    // PANTALLA COMPLETA
    // =========================
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const fullscreenModal = document.getElementById('fullscreenModal');
    const closeFullscreen = document.getElementById('closeFullscreen');

    function openFullscreen() {
      fullscreenModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeFullscreenModal() {
      fullscreenModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    fullscreenBtn.addEventListener('click', openFullscreen);
    closeFullscreen.addEventListener('click', closeFullscreenModal);

    // Cerrar con ESC
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && fullscreenModal.classList.contains('active')) {
        closeFullscreenModal();
      }
    });
  </script>

</body>
</html>
